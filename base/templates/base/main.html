<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Приложение</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FAFAFA; font-family: 'Nunito', sans-serif; padding-top: 50px; }
        .card-custom { max-width: 500px; margin: 0 auto; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); border: none; }
        .header-bar { background: #4B0082; color: white; padding: 15px; border-radius: 5px 5px 0 0; }
        .task-wrapper { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #e9e9e9; background: white; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>
</body>
</html>
